name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-musl
      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          name="linux-healthy-agent-x86_64-unknown-linux-musl"
          mkdir -p "dist/${name}"
          cp "target/x86_64-unknown-linux-musl/release/linux-healthy-agent" "dist/${name}/linux-healthy-agent"
          cp README.md README.en.md LICENSE SECURITY.md "dist/${name}/"
          tar -C "dist/${name}" -czf "dist/${name}.tar.gz" .
          (cd dist && sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256")
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/linux-healthy-agent-x86_64-unknown-linux-musl.tar.gz
            dist/linux-healthy-agent-x86_64-unknown-linux-musl.tar.gz.sha256
